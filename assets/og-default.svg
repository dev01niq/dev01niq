<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 96px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 600 44px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #00FFFF; }
      .meta { font: 400 30px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #94A3B8; }
      .badge { font: 500 24px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #67E8F9; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.22" stroke="#1F2937" stroke-width="1">
    <path d="M0 90H1200"/><path d="M0 180H1200"/><path d="M0 270H1200"/><path d="M0 360H1200"/><path d="M0 450H1200"/><path d="M0 540H1200"/>
    <path d="M120 0V630"/><path d="M240 0V630"/><path d="M360 0V630"/><path d="M480 0V630"/><path d="M600 0V630"/><path d="M720 0V630"/><path d="M840 0V630"/><path d="M960 0V630"/><path d="M1080 0V630"/>
  </g>

  <!-- web motif -->
  <g opacity="0.35" stroke="#22D3EE" stroke-width="1.2" fill="none">
    <circle cx="980" cy="120" r="80"/>
    <circle cx="980" cy="120" r="150"/>
    <circle cx="980" cy="120" r="230"/>
    <path d="M980 120L1160 40"/>
    <path d="M980 120L1190 120"/>
    <path d="M980 120L1160 210"/>
    <path d="M980 120L1050 330"/>
    <path d="M980 120L910 330"/>
  </g>

  <text x="90" y="230" class="title">spidy</text>
  <text x="92" y="300" class="subtitle" filter="url(#glow)">Full Stack &amp; AI Engineer</text>
  <text x="92" y="360" class="meta">AI • LLM • Cloud • Semantic Search</text>

  <rect x="90" y="418" rx="16" ry="16" width="430" height="58" fill="#0B1220" stroke="#155E75"/>
  <text x="115" y="455" class="badge">Building production AI systems</text>
</svg>
